bio: |
  I'm a journalist passionate about highlighting human stories in economics reporting. I'm most proud of the strong trust I build with sources and my ability to connect with people during interviews.

  I believe in fact-based reporting, using careful data analysis to drive my enterprise reporting. I utilize Python's pandas library for analysis and Svelte to create compelling visualizations.

  I'm an Upstate New York native who moved to New York City at 18. There's nothing I love more than living in New York, but while I've reported extensively on urban communities, I try never to forget my roots. I'm especially proud of my work highlighting economic issues in underrepresented rural areas across the county.

  I have four years of experience in public radio and spent one year editing and writing articles for publications like Time, LIFE and National Geographic. I thrive working in busy newsrooms, and nothing drives me more than being on a deadline.
